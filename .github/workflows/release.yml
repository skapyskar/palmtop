name: Release

# Publishing is tag-driven -- cutting a release should be an explicit act:
#   git tag v0.1.0 && git push --tags
#
# But the *build* runs on every push to master too, because a release
# pipeline that is only ever exercised for real releases is one that breaks
# at exactly the worst moment. That is not hypothetical here: the Windows
# job's first execution ever was during a release, and it stalled, holding
# the release hostage to a problem that a plain master push would have
# surfaced harmlessly days earlier. The `release` job below stays gated on
# `refs/tags/v*`, so branch pushes build and upload artifacts for inspection
# without publishing anything.
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  android:
    name: Android client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      # The signing key is decoded from a secret into a temp file that never
      # enters the workspace, and is removed immediately afterwards. It must
      # never be committed: the signing key IS the app's identity to every
      # device that installed it, cannot be rotated, and losing it means
      # never being able to update the app for existing users again.
      - name: Decode signing key
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No signing key configured -- building an unsigned APK." >&2
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          keystore="$RUNNER_TEMP/palmtop-release.jks"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$keystore"
          echo "keystore=$keystore" >> "$GITHUB_OUTPUT"
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          # Stamps the tag into versionName/versionCode -- see
          # app/build.gradle.kts. Without it every release APK claims to be
          # the same version, and "which build is this phone running?"
          # becomes unanswerable exactly when it matters.
          PALMTOP_VERSION: ${{ github.ref_name }}
          PALMTOP_KEYSTORE: ${{ steps.signing.outputs.keystore }}
          PALMTOP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          PALMTOP_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PALMTOP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Remove signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/palmtop-release.jks"

      # Named by what it is, since the unsigned variant cannot be installed
      # by an ordinary user and shipping the two under one name would be a
      # confusing failure to debug from a bug report.
      - name: Stage APK
        run: |
          mkdir -p dist
          signed="android/app/build/outputs/apk/release/app-release.apk"
          unsigned="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$signed" ]; then
            cp "$signed" "dist/palmtop-${GITHUB_REF_NAME:-dev}.apk"
          elif [ -f "$unsigned" ]; then
            cp "$unsigned" "dist/palmtop-${GITHUB_REF_NAME:-dev}-UNSIGNED.apk"
          else
            echo "no APK produced" >&2; exit 1
          fi
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  host-linux:
    name: Linux host daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # palmtopd links against PipeWire, the portal stack, and libxkbcommon
      # (keyboard layout handling for the wlr virtual-keyboard input path),
      # so the build needs their headers even though CI can never exercise
      # the capture/input paths themselves (there is no compositor on a
      # runner). Found from the v0.1.0 release run's own failure log
      # (`unable to find library -lxkbcommon`) -- this list was missing
      # libxkbcommon-dev.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libclang-dev libxkbcommon-dev pkg-config unzip

      - name: Tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --release -p palmtopd

      # pair-usb.sh needs adb, and requiring a user to separately install
      # Android platform-tools before they can even pair defeats the point of
      # a self-contained installer. Bundling Google's own official
      # platform-tools build (Apache-2.0, redistributable -- see the bundled
      # NOTICE.txt) means pair-usb.sh works with zero extra installs.
      - name: Fetch adb
        run: |
          curl -fsSL -o /tmp/platform-tools.zip \
            https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          mkdir -p adb-tools
          unzip -q /tmp/platform-tools.zip -d /tmp/platform-tools
          cp /tmp/platform-tools/platform-tools/adb adb-tools/
          cp /tmp/platform-tools/platform-tools/NOTICE.txt adb-tools/ 2>/dev/null || true
          chmod +x adb-tools/adb
          adb-tools/adb version

      # Flat, self-contained: install.sh and friends detect this layout by the
      # palmtopd binary sitting right beside them (no Cargo.toml, no config/
      # or systemd/ subdirectory to find) and adjust every path accordingly --
      # see scripts/install.sh. Everything the scripts need to run standalone
      # must be copied in here; a script that "works from the repo" but isn't
      # staged into the tarball is broken for every real release user, which
      # is exactly the failure the very first release (v0.1.0) shipped with.
      - name: Stage tarball
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          staging="palmtopd-${version}-linux-x86_64"
          mkdir -p "dist/$staging/adb-tools"
          cp target/release/palmtopd "dist/$staging/"
          cp scripts/install.sh scripts/uninstall.sh scripts/install-service.sh \
             scripts/pair-usb.sh scripts/show-pair-qr.sh scripts/host-config.sh \
             scripts/choose-encoder.sh \
             "dist/$staging/"
          chmod +x "dist/$staging"/*.sh
          cp config/host.example.toml "dist/$staging/"
          cp systemd/palmtopd.service "dist/$staging/"
          cp adb-tools/adb "dist/$staging/adb-tools/"
          cp adb-tools/NOTICE.txt "dist/$staging/adb-tools/" 2>/dev/null || true
          cp README.md "dist/$staging/" 2>/dev/null || true
          tar -czf "dist/${staging}.tar.gz" -C dist "$staging"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-host
          path: dist/*.tar.gz

  host-windows:
    name: Windows host daemon
    # Built natively on a real Windows runner against the MSVC toolchain,
    # rather than cross-compiled from Linux via mingw-w64 (which is what this
    # job did first, and which produced two problems worth not repeating):
    #
    #  1. It needed `apt-get install gcc-mingw-w64`, and GitHub's Ubuntu
    #     runners intermittently stall for double-digit minutes against
    #     azure.archive.ubuntu.com (actions/runner-images#12949, #7048, and
    #     recurring since #675). The very first run of this job hit exactly
    #     that. A native Windows build needs no package manager at all, so
    #     that entire failure mode disappears.
    #  2. `windows-rs` is developed and tested primarily against MSVC; the
    #     GNU/mingw target is the less-trodden path for precisely the
    #     WinRT/COM surface platform::windows::capture leans on.
    #
    # The decisive gain, though, is that the tests can actually *run* here.
    # Cross-compiling produced an .exe no Linux runner could execute, so
    # keymap's table and doctor's classify_build were only ever verified on
    # Linux. Now they execute on the OS they describe.
    runs-on: windows-latest
    # Windows runners are slower to start and build than Linux ones; 30
    # minutes is generous for this job while still failing fast if something
    # genuinely hangs, rather than burning to the 6-hour default ceiling.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # No `targets:` needed -- x86_64-pc-windows-msvc is this runner's
      # native host target.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc

      # Scoped to the three crates that actually build on Windows. `--workspace`
      # would drag in the spike-* crates, which are frozen Phase 0 history
      # bound to pipewire/wayland and Linux-only by construction.
      - name: Tests
        run: cargo test -p palmtopd -p palmtop-config -p palmtop-proto

      - name: Clippy
        run: cargo clippy -p palmtopd -p palmtop-config --all-targets -- -D warnings

      - name: Build
        run: cargo build --release -p palmtopd

      # BtbN's builds are static, GPL (libx264 included), and published under
      # a stable "latest" release tag -- no version number to keep in sync
      # with this workflow by hand. gyan.dev's builds (linked from the
      # official ffmpeg.org downloads page) are the more commonly recommended
      # source for a human installing by hand, but don't offer a URL this
      # stable for automation.
      - name: Fetch ffmpeg.exe
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extracted
          $exe = Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in the downloaded archive" }
          Copy-Item $exe.FullName ffmpeg.exe
          .\ffmpeg.exe -hide_banner -version | Select-Object -First 1

      # Same flat, self-contained layout as the Linux tarball -- install.ps1
      # detects this by palmtopd.exe sitting right beside it (see
      # scripts/install.ps1's own layout-detection comment).
      - name: Stage zip
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $staging = "palmtopd-$version-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "dist\$staging" | Out-Null
          Copy-Item target\release\palmtopd.exe "dist\$staging\"
          Copy-Item ffmpeg.exe "dist\$staging\"
          Copy-Item scripts\install.ps1, scripts\uninstall.ps1 "dist\$staging\"
          Copy-Item config\host.example.toml "dist\$staging\"
          Copy-Item README.md "dist\$staging\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist\$staging" -DestinationPath "dist\$staging.zip"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-host
          path: dist/*.zip

  release:
    name: Publish release
    needs: [android, host-linux, host-windows]
    runs-on: ubuntu-latest
    # Only for real tags. A workflow_dispatch run builds and uploads
    # artifacts for inspection but must not create a GitHub Release.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/linux-host/*.tar.gz
            artifacts/windows-host/*.zip
          generate_release_notes: true
          body: |
            ## Install

            **Phone** — download the `.apk` below and install it. Android will
            ask you to allow installing from this source; that is expected for
            an app not distributed through the Play Store.

            **Laptop (Linux, Wayland)** — download the `.tar.gz`, extract it, and run:

            ```
            ./install.sh --from-release
            ```

            Then pair the two. Over a USB cable (the pairing secret never
            touches the network):

            ```
            ./pair-usb.sh
            ```

            Or wirelessly, by scanning a QR code:

            ```
            ./show-pair-qr.sh
            ```

            If more than one encoder works on your machine, it is worth
            trying the others — auto-detection picks the first that works,
            not necessarily the smoothest:

            ```
            ./choose-encoder.sh
            ```

            Full setup guide in the README.

            *(A Windows host exists in the source tree but is not shipped
            yet — it has not been verified on real hardware.)*

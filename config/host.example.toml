# Template for the host (the Linux machine running the capture/encode side).
# Copy to host.toml and edit. Populate with: ./scripts/probe-host.sh

[host]
# This machine's IP on the network shared with the phone. The phone dials this.
# Leave empty to auto-detect the primary interface address at runtime.
ip   = ""
# TCP port the stream server listens on.
port = 9999

[gpu]
# DRM render node used for VA-API hardware encode.
# Hybrid-GPU laptops expose several -- pick the one you actually want to encode on.
# Identify them with:
#   for n in /dev/dri/renderD*; do
#     echo "$n -> $(cat /sys/class/drm/$(basename $n)/device/uevent | grep DRIVER)"
#   done
vaapi_render_node = "/dev/dri/renderD128"

[encode]
# Which encoder to stream through. See what this machine can actually do:
#   palmtopd --list-encoders
# and pick one (or use ./choose-encoder.sh for a menu):
#   palmtopd --set-encoder h264_nvenc
#
#   "auto"        -- try each in turn, use the first that works (the default)
#   "h264_vaapi"  -- VA-API, on the render node set in [gpu] above
#   "h264_nvenc"  -- NVENC, on an NVIDIA GPU
#   "h264_qsv"    -- Intel Quick Sync
#   "h264_amf"    -- AMD AMF
#   "libx264"     -- software encoding (real CPU cost, but works almost
#                    anywhere -- useful if a hardware encoder is technically
#                    available but you want the fallback anyway)
#
# Worth pinning rather than leaving on "auto" if you have more than one
# working option: auto-detection picks the first that *works*, which is not
# necessarily the one that *feels* best. On a hybrid-GPU laptop the iGPU and
# the dGPU differ in latency, power draw, and fan noise, and which trade-off
# you want is not something a probe can decide for you.
#
# A pinned encoder that stops working (driver update, GPU swapped out) falls
# back to auto-detection with a loud warning rather than refusing to stream.
codec = "auto"
qp    = 24
fps   = 30
# VA-API frame-pipelining depth. Lower = less input-to-screen lag, at the cost
# of encoder throughput headroom. 1 is the right default for an interactive
# control loop (as opposed to e.g. video export, where higher values trade
# latency for better compression efficiency/throughput).
async_depth = 1

# [pairing] is NOT listed here on purpose -- palmtopd generates it itself on
# first run (pairing token + a static Noise X25519 keypair for transport
# encryption) and appends it to this file. Never hand-edit those values;
# regenerating them locks out every client that already paired using the old
# ones. See palmtop-proto::noise and palmtopd/src/pairing.rs.
